body:
  text: 金剛經注正訛序夫般若真空金剛妙義使人悟自本性達自本心頓脫萬擾根塵能虗一切身相始為詮注咸從自心流出圓明淨妙渾如皎日照耀多千佛土澗悉無遺然金剛一經有五譯之異獨秦鳩摩羅什創譯廣大流通盛行於世吾鄉仲子士石幼攻鄒魯衆聖典墳晚訊竺乾諸經奧旨每嘗讀誦金剛般若經竟忘歲月智慧從生於夢幻泡影審其虗妄不真於人我衆壽了其根元無相彚纂諸注刪繁簡要解義正訛似懸金鏡於當臺妍悉露如納衆流於巨海洋溢清澄無論若緇與素按覽咸明無上菩提矣間得王際時廣文久耽禪學校正參詳裒諸善信剞劂流行倘遇再來大鑒聞誦因無所住忽悟本來庶幾功用不淺貴當領取言外知歸自然虗空消殞求文字相了不可得真入不可思議願讀者信受斯語方有得焉時金剛經注正訛序西竺梵書來我華夏歷千七百餘矣會其旨者明性復元代有明哲意其文似無舛訛如金剛一經自鳩摩羅什譯之長安名舍衛國嗣是支流初譯于雒陽名舍婆提真諦再譯於秪樹林佛陀耶舍三譯於祗陀林後玄奘又譯於誓多林凡此五譯其文其義果同符協一與如同符協一也則一譯安用再譯其否也則此是彼非者將何去何從是誠啓訛之竇即釋義自謝靈運曇琛注後越今數十百家行世者惟中峰圭峰長水三家言耳然二峰之注果優於謝子乎長水之言賢於二峰乎否意五經傳注朱程是尚要朱程亦屬射覆若百世以下之人能與百世以上之心同符協一又曷貴乎見知也況於萬里外千載前之蟲書鳥篆欲詮其心法即令其人再生自考不無今是昨非而欲執我見期印前人之志譬之逐影形愈勞而影愈馳矣無惑乎訛之日滋也竊願讀金經者毋佛誹儒毋重儒外佛弗以儒傅佛勿以佛泥儒當以儒解儒即以佛證佛矣全部金經約其指歸只應如是住一語與虞書安汝止之言寧有差等奈人強生分別是猶土偶笑木偶也樹若仲子名儒也於經於史無不擷其芳茹其英篝燈研露之餘旁獵金經凡句讀之訛音聲之訛釋解之訛一一正之俾誦習者燎若藜火其功當與丁鴻白虎觀考正五經同異等可云經獅律虎矣然余竊有疑焉如來説法鹿苑以不立文字為宗余宗之素矣今仲子以此書契期證禪那恐居余左或云慧業文人應生天上仲子具慧心慧舌有此慧業余之不立文字者又居仲子之後奈何請以一言正余之訛可否康熙丙辰六月同學徐來賓九一甫拜題
