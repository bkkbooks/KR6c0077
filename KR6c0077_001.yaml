body:
  text: 清長水仲之屏士石甫彚纂天都王維新際時甫校正金剛般若波羅蜜經此經釋迦文佛所説阿難迦葉述之以垂世者金為萬物之寶其性最剛遇火不變喻人真性歷劫不壞般若智慧也波羅彼岸也智慧明了之心能斷一切執著便是金剛不壞之身非精力如金之剛即無此智慧故曰金剛般若心迷則此岸心悟則彼岸衆生流浪生死不離此岸若能勤修般若離生死此岸便到涅槃彼岸矣無住般若即為涅槃彼岸非般若外更有彼岸也蜜訓和以一性和合衆性也經訓徑佛以言教明心之徑路是超生死之捷徑夫具善根者始誦經終悟理得堅固力金剛是也具大智慧般若是也度生死海登菩提岸波羅蜜是也全經俱詮般若妙義故如來號為般若波羅蜜經法會因由分第一此經三十二分乃梁時昭明太子蕭統所分自如是至敷座是説法衆會之處故稱法會因由如是我聞自此至五十人俱是一經總序如者揣摹之義是者指證之辭謂一經所言也佛法無我此云我者就闡揚佛法之身而言阿難迦葉自謂也聞者耳根發識緣彼名句而生慧解也阿難升座説法因謂此經所言如是之法我從佛聞於某處某衆等而初非有臆説也一時佛在舍衛國祇樹給孤獨園西天東土正朔不同故不標年月只云一時乃機緣會合説此般若時也諸方時際延促不同故但言一佛者覺也內覺無諸妄念外覺不染六塵自覺覺人覺行圓滿故獨稱佛即世尊釋迦牟尼佛名悉達多父淨梵王摩耶其母也在者明其處所偶然卓錫非是常居舍衛國在西域天竺之東波斯匿王所居祇樹是匿王太子祇陀所種因以為名給孤獨匿王大臣須達拏長者別號園本祇陀太子園因須達常於其中布施孤獨貧人故即名給孤獨須達請佛説法佛令先卜勝地惟祇陀太子園方廣嚴潔往白太子太子戲曰若布金滿園我當賣之須達歸家運金側布八十頃園並滿太子不復受金同建法林精舍請佛住此説法二句是記者以所聞所見證如來現身説法與大比丘衆千二百五十人俱與者并及之義比丘弟子之稱去惡取善為小比丘善惡俱遣名大比丘大者以其通達道理猶高座弟子是阿羅漢之類衆者理事和合多而若一也佛成道時先度憍陳如等五人次度三迦葉并其徒衆千人次度舍利弗等百人次度目犍連百人又耶舍長者五十人一一法會常隨佛不舍故諸經首列大衆皆云千二百五十人俱俱者同處園中聽法也此言佛在此地而從之者衆見能化諸弟子處爾時世尊食時著衣持鉢入舍衛大城乞食此為別序爾時當是時也佛為世界之尊故稱世尊諸天神旦食諸鬼夕食諸佛日中食食時者午前辰巳之交著衣者服伽黎忍辱之衣持鉢者將維衛所傳之鉢為顯教示迹以出行也入者自城外而入舍衛大城舍衛國之豐德城即波斯匿王所居身為王子而乞食自卑蓋以折己憍慢感化衆生又使後世比丘不積聚財寶也於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐次第乞不是如來一身去乞尚有千二百五十人與俱者迦葉行乞捨富從貧為貧者造福空生行乞捨貧就富為富者易施佛皆訶之次第者平等待人無有選擇分別不越貧從富不捨賤從貴次第遍及彀足一己一日之食明日從未乞者起乃得周遍見佛自如無有忙迫已者竟也乞過則已並不留一毫未已之想本處即給孤園仍歸祇園食之凡聽法伺候者此時皆飯食訖矣收字照上著持二字乃安置袈裟浣滌盂鉢此日不再出也洗足者佛行跣足以水濯之亦淨身業意洗去煩惱垢染顯出清淨法身故僧稱為白足敷布也布坐具而跏趺正晏息入定也凡臥則昏沉行則掉舉坐則疲倦惟跏趺打坐是為正法佛形相端嚴不左右顧盻如此此段描寫世尊及時中節正顯甚深般若不出尋常日用佛直從乞食趺坐中和盤托出俾上達根性目擊道存也周昭王二十四年甲寅歲四月八日井泉溢宮殿震夜恆星不見太史蘇繇占為西方聖人生其釋迦之誕降歟善現起請分第二須菩提先讚如來而後請問故云善現起請時長老須菩提時者善現起問時也德尊年劭曰長老見與衆比丘不同須菩提是梵語此云空生亦名善現以其頓悟空寂之性真是菩提故名須菩提空中能生萬物故名空生空性隨緣應現利人利物故又名善現凡與釋迦問答者皆是非止一人也在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言修行人了不求異故云在大衆中即千二百五十人內也大衆因聽法而皆坐獨善現從坐間起立而請法自此至恭敬乃弟子請法先行五種威儀所謂三業虔誠也北土謝過請罪則肉袒西土興敬行禮則偏袒其時所衣則偏袒而挂之右肩西域衣製皆然非善現獨穿此也右膝著地今之跪禮不言左者省文也右是正道左是邪道正能去邪所以西土之儀尚右為敬合掌恭敬只是求世尊説法意白表白也希有世尊善現不率爾而問先用讚佛之辭以誠感動之然後啓請希有者佛性含容萬法非尋常所能世尊者智慧超過三界神聖無有能及德高無上一切咸恭敬也此從日用極尋常之內覷破千古極非常之人也如來善護念諸菩薩善付囑諸菩薩既稱世尊又稱如來蓋如來是佛號可以通稱者如乃真性之本體慧照而無有障礙來乃真性之應用感通而無不昭彰兼佛體用言護念二句正所稱希有事此先述佛之素行以啓其慈也護者愛護念者注念謂如來慈悲深重於親得聞法者曲加愛惜顧念與智慧力令自成就與化導力令亦度生也付者委托囑者叮嚀謂如來智眼明淨於天下後世不及親聞者能委曲誨示反覆精詳令皆感悟從大付小為之授記囑大護小使之有成也兩稱善者當理會機既不勉強以導豈可聲色而求但循循善誘為最後垂範而已諸者不一之義菩之言照薩之言見此菩薩乃初發心菩薩即下善男子善女人是也梵語本云菩提薩埵茲略其文而稱菩薩以便於稱喚也菩提華言覺薩埵華言有情謂之覺有情者能起善念而猶未絶情想也若到佛地位直謂之覺而不言有情矣諸菩薩則人之有情而向善者故佛護囑之世尊善男子善女人凡有咨啓即稱世尊以表敬也此下四句乃發問之端善男女在千二百五十人之外者男子該比丘沙彌優婆塞三衆女人該比丘尼沙彌尼優婆夷式叉摩那四衆即經末所謂比丘優婆等佛欲廣度男女皆向善也發阿耨多羅三藐三菩提心應云何住云何降伏其心應字在云何上見李騰芳及朱㤝劬諸本此又深體護囑之心以求誨示也凡人有此心而溺於情欲則不能發生譬如萌芽方茁而為物掩則欲茁而不得茁矣發者萌芽之謂順其所生也阿是助語辭耨多羅猶言無上三藐正等也三菩提正覺也謂真性高出情欲是無上物物具足是正等光明普照無業緣染蔽是正覺上正字作證字解下正字作中正字解謂男女發此善念日用之間酬酢萬變應若何而優遊間定得近自然於無住中而若有所住也住者止觀之義有真心即有妄心須於邪心續起時以大覺力降伏之如制毒龍如縛猛虎如禦強寇稍不能降反為所中所住者常則所伏者潛消而默化矣二句是求一入門路徑也佛言善哉善哉須菩提如汝所説如來善護念諸菩薩善付囑諸菩薩善現所問切於修心妙稱佛意故佛印可云善得我心哉善得我意哉蓋既讚其是又呼而述其説也汝今諦聽當為汝説諦聽者了達聲塵勿逐語言詳審而聽也佛將説法常先戒敕令聽者一心靜默我當以微妙之旨為汝委細言之則所説者皆真諦矣下文所稱是也善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心佛就所問而答之謂一切男女菩薩若欲修行發無上真正無法不知之心我有道理教汝應如是般若法無有過無有不及恰好到此地位而住如是般若法一切魔障惡道盡行銷歸住處而降伏其妄想之心蓋懸指下文所答之意二句須串看非一心住又一心降伏也蓋於所當住者住之則所不當住者自然伏之矣此非具戒定慧者不能也戒是防非止惡定則寂靜不動慧乃明照先知如海中現萬象必須水清欲清無過水靜欲靜勿令起波止波似戒水靜似定水清似慧所現物像似慧之達一切法全在住與降伏處得之唯然世尊願樂欲聞佛才説應如是題頭未發明如是之實善現即會佛意不覺喜聲難禁唯然應諾呼佛名號謂我願傾心樂聞如是住二句之旨也善現恐來世衆生不能躬遇如來更冀曲垂方便俾衆生因有言而獲無言由文字而證實相欲護念付囑垂諸無窮也一經之要善現所問不過住伏如來所答不出破執斷疑而已大乘正宗分第三此心不能降伏為有我人衆生壽者四種情妄馳逐去來輪轉不息故令度九類生皆入無餘涅槃四相既盡則此心不待別有降伏而自然寧謐非正宗而何此分與四分是一頭猶大學之有聖經中庸之有天命章也一經大旨已括於此二分佛告須菩提諸菩薩摩訶薩應如是降伏其心善現言善男女此云菩薩者蓋未發心則是凡夫已發心則是菩薩也摩訶薩者心量寬廣不可測識於諸菩薩中而又為大菩薩也言大菩薩亦不過從此入門入門之法只是一個降伏其心問先住而答先降伏者正以勇猛精進之法告也人心最難降伏惟能以勇猛力量精進神思得步入步便是降伏工夫故應如是下文即降伏之所以然也所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想發心修佛行以度生為要務調攝衆生即是調攝自心故為降伏之實自諸天及蠢動皆不免有生所以謂之一切衆生該下九種言類者不可勝舉也若者是一一指點處合三界衆生有自殼而生者如大而鳳鸛細而蟻虱之屬有脫胎而生者如大而獅象小而貓鼠之屬有依濕而生者如魚蟹及水族細蟲有從變化而生者如蟬蝶等四種單指物言不涉人類若有色下單指人言不涉物類有色者是有色身溺於情欲之輩無色者雖有色身而斷絶情欲之輩有想者近於神鬼之精靈無想者等於冥頑之木石非有想非無想者似呆蠢無思而又非真呆蠢無思也我皆令入無餘涅槃而滅度之我指發菩提心者言非佛自謂也之字指上九種衆生涅槃者如來真性明覺超脫輪回與天地終始永無斷續乃修行之極則由小乘聲聞果至大乘十地菩薩然後及等覺及勢至位及觀音位乃入如來而歸涅槃必歷劫修持到此衆生各有涅槃妙心發心菩薩皆當令之見性悟入如來之大涅槃九種既分人物便有靈蠢之殊如何令皆滅度惟不分靈蠢而皆滅度所以為無餘涅槃四字相連滅度不是生滅之滅是言如來度人妙於潛移默化使之盡行化度而毫無形迹也然滅度工夫總不出降伏其心時耳十地歡喜地達物境界發光地靜極明生離垢地同異性滅焰慧地明極覺滿現前地同異不至不動地一真如心難勝地性淨明露善慧地發真如用遠行地盡真如際法雲地覆涅槃海如是滅度無量無數無邊衆生實無衆生得滅度者承上言我雖開悟此等無可限量無可計數無有邊際一切之衆生化之皆得成佛亦適還其本然不以我之化度而成證果何所加益而謂我得滅度之哉度生經中共有四處此是世尊離我度生於衆生自完本性實無有度二是佛家亦無法度生何由自知有度三是不見度生之為真實如云大身之止為虗名四是戒人莫執度生之相總之念念在度生念念皆忘執也何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩佛問何由不見有度遂呼善現而反言之曰若菩薩作一念謂我當滅度衆生而謂我之一身可以度之則菩薩心中不能了證無我而有度生之我相見彼沾我功勞得度即是人相則前此九種衆生便分靈蠢高下而存一衆生相既有衆生相將欲以我之身永長於世而化度一切便生壽者相如此則妄念紛紜不能降伏自己盡是生滅之相安能度人則非發菩提心修菩提行者矣此論人空以明無我能度無衆生得度之義人與我對自我之外三界六道皆人也衆生與壽者對自衆生而上一切賢聖諸佛菩薩皆壽者也計著有諸佛菩薩涅槃不生不死便是壽者相也了得四相直下頓空則妄心頓滅所以云應如是降伏其心降伏自相即得自住無餘涅槃亦能令衆生安住無餘涅槃故上實無衆生句正降伏之要也我人四相在根為見在境為相當境而起者多故經中多言四相妙行無住分第四佛謂心有所住即是愚癡心無所住乃是般若自色之一法至菩提涅槃俱不令有所住不惟布施一法乃至六波羅蜜四無量心亦無所住其無住而住之功雖十方虗空之大不可比量故稱妙行無住復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施此答應云何住之問見如是住以無住為住也上説無四相此問正發明無相之旨是時善現從座起立故世尊使復坐於位次而告之曰人心原無住所但菩薩修行離不得一法字度生又執不得一法字法即無四相之法也極意執著四相便不得空諸所有故求正覺者應當無所住著更當以我無住者教化衆生行於布施而令衆生之心亦無住著篇中七住字上六住俱作執著解末住字作止住解即以六度中布施一節言之亦不可以執著行之也布普施散也此段不重布施世尊仍為大衆説法而借布施一事以發明無住相耳不住色等布施是以無住行施也二句頂上來布施而單説色者凡人之念只為功德修於目前福報留於身後便刻刻為自己地步非普度之大願矣故言不住色布施不特於六塵中生此吝惜眷戀而為住即使盡蠲一切其不忘福報之心終著色相身不著觸如冷暖勞佚之類意不著法如晨早想日中所為夜眠思明日欲行之事若離六塵即落斷滅若不離六塵又起輪回菩提之心息矣衆生得滅度乎佛所謂不住者非離非即也六度一曰布施為檀波羅蜜二曰持戒為尸波羅蜜三曰忍辱為羼提波羅蜜四曰精進為毗離耶波羅蜜五曰禪定為禪波羅蜜六曰智慧為般若波羅蜜六者全為到彼岸故曰六度六根眼耳鼻舌身意如眼為色根耳為聲根等是也六塵色聲香味觸法如色為眼塵聲為耳塵等是也六賊根與塵相引淆亂真性也五蘊一曰色著念物色二曰受心自領納三曰想思惟不已四曰行造作流轉五曰識分別取捨以其積聚謂之五蘊又遮掩本性為五陰也須菩提菩薩應如是布施不住於相是字即指上不住六塵相即六塵之相也佛又謂善現轉教菩薩應如是行施了達體空不住於相蓋欲菩薩降伏其心也夫不住六塵之法即真空常住之法以是行施則內不見有能施之我外不見有受施之人中不見有所施之物雖終日施盡人施而實未嘗施是為不住相之施何以故若菩薩不住相布施其福德不可思量善現問施本求福曰不住於相其意云何佛答云學道之人以法性了徹為福德不以世緣豐厚為福德人疑離相布施或無福報豈知世福有盡性福無窮此不住相之施雖不徼福歷千劫而不古超三界以長今其福德何可思惟量度耶此非以果報引誘衆生只緣衆生布施一念求福者多故以福德聳動之須菩提於意云何東方虗空可思量不不也世尊於意云何者是教善現於意中自去忖度一番也菩薩教人每每劈頭提喚使之自證自驗正提撕警覺諄切處蓋鼓舞機關勝於當場棒喝也經中三十個於意云何及何以故皆作是解菩薩行施心無希求獲福如虗空之不可量故又以虗空喻福德以無為福非有心可較也佛在西方遠對東方故問東方虗空可以意料窮盡否善現謂東方虗空我思量之實無可思量也故言弗也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量四維四隅上天下地也佛又問南西北方及乾艮巽坤四隅天地虗空法界合之為十方佛眼立見十方世界故借此以比福德之廣遠須菩提會佛意有十方便有處所而此十方盡屬虗空無有邊際不可思惟量度故又云弗也世尊虗空中本無東南西北若見東南西北亦是住相不得解脫佛性本無我人衆生壽者若有四相可見亦是住相布施若菩薩將住相求福之念一反虗空則妄心盡而妄相亦除只有性福無邊亦復如上所云十方之無窮盡矣此段正言不求福德而福德自至蓋以其無執著也空雖無相非謂無空福雖不住非謂無福況乎世界有盡空虗無窮有漏有窮無漏無盡然則無住之福實稱法界豈思慮所能及哉須菩提菩薩但應如所教住所教即上無住相布施之教佛又恐人生果報心又呼其名汝轉教諸菩薩但當依我所説之教不住於相而降伏其心則此心便有定向而得所住止矣此言法空蓋結無住相而并結降伏也要見無住行施乃發心者喫緊工夫不得分為兩事自此以上已竟降伏安住之問矣如理實見分第五上言降住之法俱不住相則佛果遠矣將無落斷滅見乎豈知如來正不在遠著相即迷離相即顯所以汰其空見也須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來自此至十六分反覆發明住心降心之義亦猶學庸之分章也不住相之外更無降伏是住義甚為緊要故又闡發上文無住相之旨是現身説法處上言無相無住皆無心之修佛恐其猶疑有身故呼而使其自思此兩身相并下一句身相皆指色身言此兩如來皆指佛性即佛法身此是以色勘驗是色非六塵粗色乃發菩提所求佛身相好之色若果於此不惑方堪付囑故以彼眼所見驗之問果可以現在説法之身相見如來否乃總收住伏二處文字也時善現當下直認云弗也又稱世尊而言色身有相地水火風假合成人法身無相絶諸形體不可以今日説法之身相得執著之以見如來也何以故如來所説身相即非身相善現隨自發明其意曰何故不可身相見如來即自答云原佛所説色身之相原無法身真實之相即猶是也非猶不也文法似倒正言不是也如來以法為身身相不過真身所現之影像若執影像誤真身則如來掩矣故不可得見也佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來佛因其悟色身非相遂擴之云汝知身相不是法身真實之相則不獨佛身然也有相之相中無真實之理凡世間所有變現之相盡屬虗空妄設無有實際若能灼見紛紛外相不是實相則不止佛有法身之非相一切衆生皆有一非相之相矣一切衆生既有非相之相則一切衆生能見此非相便生智慧本性如來若真見之矣何必但認佛為如來耶此二句明説人人有佛心而不可存佛相佛心刻刻在念無相而相真佛相或留於世有相而相假見得即心即佛不落障礙方為無住相也見如來凡四處此是執色身則不得真性二是色身有壞時惟性為真實三是不離色身而想真性四是不即色身而得真性恐學佛者就佛身起念故屢諭之要識自己本性即是如來耳正信希有分第六今之信般若者皆昔於無量佛所深種善根而來夫般若之心乃名正信得福無量則不復執相滯見而墮虗妄然不執相滯見之法亦欲令捨何況執相滯見之非法而不捨者非愚而何須菩提白佛言世尊頗有衆生得聞如是言説章句生實信不善現聞不可身相見如來之説恐人因此一言而并佛言皆屬空虗故白佛言頗有疑其未必有也衆生得聞應如是住與不住於相等言説及經中一章一句生信心而奉持否乎信佛者有實信為難實信者非泛然浮慕也法華會上猶有五千退席聲聞況求實信於末世衆生其可必乎此慮末世不見佛相但聞佛言而生懈心故有是問佛告須菩提莫作是説如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者佛訶善現云莫作是生實信之説此中章句不論世代遠近無有不信者五百歲是如來約略之時世運以五百歲而一治亂此時出而復為化度所以視五百歲為期也不惟我現在時聞此般若法門不以為難即使如來於五百歲之前説此言而五百歲後僅有言在其有持佛戒而修福德者遇此章句能生信心汝所謂實信者寧有他哉正以此為實也一佛出世謂之一佛當知斯人之善根已深不特於一二善人及三四五之善人持戒修福得此善根已於無可限量之善人至千萬善中會著源頭得此種子根深蒂固故聞此章句乃至無住相一念中生淨信心信此經能除一切煩惱成就出世功德則是如來之言雖世遠人湮而且信從況近代乎實信者真確不虗淨信者純一不雜蓋至淨信則實又不足言矣信心經中凡四處此是種善根之人難得二是能離相之人希有三是稱其人功德之大四是引勸衆生前云善護囑正於此等人所謂善男女諸菩薩是也令入無餘涅槃其根器辨於此須菩提如來悉知悉見是諸衆生得如是無量福德何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相即此淨信一念正佛與衆生平等之心如來即從今日照見未來衆生從歷劫修行得如是無量福德何以故者發明無量福德句也後世衆生中特出其人是諸清淨心之衆生夙世陶鎔盡空諸相無復一毫迷戀不惟我人等相皆空并法相與非法相一切清淨故得如來知見最深也無法相者章句説法難於拘泥無著有心也無非法相者法以垂教不可不遵并無著無心也凡此皆為淨信而慧性即如來所以得福無量也何以故是諸衆生若心取相則為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相即著我人衆生壽者何故要無諸相此下反言之是諸衆生若心中先有一相而取之以為我或求西方或求天上或求後世為人則為著四相而念不淨此句多一為字者以四相本無而我自為此相耳若以世故留心偏於有而認法相取之我得般若波羅蜜法則執心外有法拘泥難通及隨世態即著四相而念不淨若偏於無而認非法相取之我不行般若波羅蜜法則執頑空為法任意而行即著四相而念不淨凡此皆為不種善根安能淨信而得福耶是故不應取法不應取非法以是義故如來常説汝等比丘知我説法如筏喻者法尚應捨何況非法上既正言反言以示勸戒此復結言執取之非宜惟如來之法不可偏有偏無離了法便是非法取法著有取非法著無是故不應取法而徒托於章句不應取非法而竟入於斷滅正以是無住相之義皆不可以有無之心執著故也知其故則此義非從今日言之如來常語諸弟子云汝等今日聽法之比丘當知我所説度生布施諸法不可倚靠正如涉川之舟楫一般筏字宜斷此處不必補出及其既渡即為捨筏若是心體明淨之人觀空照了聞言頓悟此喻者也如魚飲水冷暖自知此時任是説玄説妙廣大神通到此都無用處故曰法尚應捨此正所謂得魚忘筌得兔忘蹄也何況非法本無出自己意而可誤執也哉惟其能捨所以直到彼岸而有如是無量福德耳如此説來文勢順而易曉若如筏喻者為句理已難通下法尚應捨句又如何接得去若解非法作邪魔外道何喻及捨筏之已悟者耶觀法尚應捨句如來於此又超出章句已深於前言説章句生實信矣無得無説分第七無為法三界惟心也有差別萬法惟識也心無為故説性識差別故説相總欲人會相歸性轉識歸心安得有法有説耶故此分名無得無説須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所説法耶須菩提言如我解佛所説義無有定法名阿耨多羅三藐三菩提亦無有定法如來可説此承上法尚應捨來是設疑以啓悟善現意無得無説是大柱子因善現疑佛得菩提疑佛説法故遂順其意問之曰汝今意中若何謂樹下得道如來得菩提不得耶諸會説法謂如來説法不説法耶則法不當捨矣耶者未定辭蓋試其解不解也善現答云如我解佛所説不取諸相等第一義若是有定則可名而可得此無上正等正覺之法極其神化變通無執無著何有實相而名菩提既無有得可名只可性修難以口喻應機而酬隨叩而答何有實法如來而説之蓋謂無道可證無法可説也此正所謂解佛所説義也法不可定者不是千條萬緒多而難定只因人人有此正覺便應直造無上一泥於法即落窠臼而覺性反為法泥下句説一亦字見如來得之於己與喻之於人皆從性真活潑處發出並非有成法而為説法也無得凡四處此是原無定法故無得二是師以心傳不以言傳故無得三是菩提乃自己之心何從而得四是證果之後自還本真雖得而不謂之得無説亦有四處此是法非真實則説亦無説二是理入玄妙無容説三是入門有得不復待説四是悟到真空不可言説何以故如來所説法皆不可取不可説非法非非法何故無定法無定説如來開示衆生非不説法然如來所説無上菩提非有真實之法此不可以一定之法取亦不可以一定之法説惟不可取則亦不可説到此説不得是法亦説不得不是法矣將以為法却又非法將以為非法却又非非法然如來隨應有證有説者蓋得非有非無之體也所以者何一切賢聖皆以無為法而有差別然所以不可取不可説既謂非法又謂非非法者何蓋有取有説法非法等皆屬有為即經末所謂有為法也無相無住順其自然無假人為曰無為以用也一切之菩薩而稱為賢如來之地位而稱為聖皆不假造作強為造成賢聖但其中先知後覺各自不同故以後覺者為賢先知者為聖而微有差等分別耳無為乃自證之體差別乃化俗之用人之差別雖異法之無為則同法惟無為所以不可取不可説也豈得以人有差別而疑之乎無為照上淨信句淨則無為不淨則紛紛錯起而為之不勝矣依法出生分第八佛謂有人於般若章句自一句至無數等句而能受持不惟超過河沙七寶布施之福當知般若體中能出生諸佛及阿耨菩提故名依法出生須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來説福德多佛恐人聞是法不可取説便欲毀棄言教將何信解使諸佛出生故較量持説福德謂捨財修福不如施法修慧以結六分以下一支也不住相布施非教凡夫慳貪專為凡夫昔種福田今有財施然彼但知求福而不知求慧則福有盡而業愈深故教其修菩薩行佛問假如人以三千大千而又滿此世界無有脫空盡著七寶布施為種來生福因是人所得之福德多乎不多乎善現答言甚多隨自究其甚多之故即自答云此寶施特世間福德事而非般若福德性若福德本之於性更何處計其多少如來就事相論故説寶施之福德多以其有限得計多寡也世間財有盡福亦有盡但可計其甚多不得為無量此問答俱設詞心淨色空如鏡無塵翳心淨見色如鏡無翳即能現諸像也人為色身起妄心遂分別爾我於一切順情境起貪心違情境起瞋心力護自身反受煩惱勞苦其名為癡貪瞋癡壞其性矣當思世人無有不死者只死後靈性不能泯沒故佛教人修福德性以性能歷劫常存耳經只於此一露性字其實一經所言無非要人見性日月所照為一小世界中間有須彌山日月繞山運行南為閻浮提西為瞿耶尼北為𣠵單越東為弗婆提是名四天下日月運行在此山中腰此山高出日月上山上分四方每方八所中間又一所共三十三所謂之三十三天日月運行於四天下謂之小世界如此一千小千世界為小千如此一千小千世界為中千如此一千中千世界為大千以三次言千故云三千大千其實只一大千耳是謂一大世界三千極言世界之多至於大千多之已極七寶金銀琉璃珊瑚瑪瑙真珠玻璃也若復有人於此經中受持乃至四句偈等為他人説其福勝彼世尊因以福德性言之其惟持經乎若菩薩於此經中先自明心見性解悟真空實相妙理受之而不忘於心持之而不厭其久多則全經或自一句二句三句乃至四句偈等字不單指四句言復憫此衆生隨機開導此為自性福德不可思量豈寶施所能及哉持説少許尚有無量福德況不止四句者此是第一番較量經勝不明指四句為何説者欲人自悟偈在何所也持經較福共有七處各自為意此以滿世界寶施不及持經二以河沙多世界寶施則加廣矣三以河沙等身命施不及持經四以一日三時無量身命施又加廣矣五以世尊前生供養諸佛亦不及持經則佛因又加於布施矣是外財兩次內財兩次佛因一次較量已極故後兩稱算數譬喻所不能及外又有兩處相似一以見經有善法之當修一以見演説教人之有功非更有讚較而意多重疊也何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出何故持經者之得福勝於寶施耶須知一切古今諸佛何佛不從般若成一切道果受持此經則煩惱自斷妙慧自新妙慧即諸佛法身是佛從此經出也一切古今諸佛具般若真智導引衆生隨緣説法從菩提心生即菩提法是法從此經出也故知此經非指文句謂般若性體也蓋諸佛之身及所證之法無不從般若而生以此施人則一佛化為無數佛一法演成無數法性中福德豈不甚多也耶須菩提所謂佛法者即非佛法然猶恐其拘泥佛法又呼而告之所謂佛法者佛得之而餘人未得故曰佛法然其實人人自具佛本非佛法亦非法佛法不出衆生日用切莫執諸相為佛法向外尋求也必自證本性超悟法外以之覺人方為福德性而可言無量耳推勘至此非法非非法之旨不益彰乎一相無相分第九善現謂二乘人獨證四果亦未免滯於所得不能離四相四見然後自述無心於事無事於心已至無諍故佛稱善現為解空第一須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊上無為法有差別之語大契如來本懷佛慮其倣效所得或生執心故復就賢聖位次由四果至如來極之六度萬行莊嚴佛土之菩薩一一探其見地虗實以結住伏也此下三分申言凡所有相皆是虗妄此指無為法有差別樣子人心止有降妄法別無住真法故智慧愈大心體愈空無所取無所得也須陀洹者謂初入門已斷見惑粗重煩惱不生不受修羅異類之身此聲聞所證初果也作是念當玩凡人居一地步貴其無念蓋經意只要人斷念也詰云初果之人能作如是證果之念我得其果否乎答以無所取而自成若了無相法即無得果之心微有得果之心即不名須陀洹故言弗也果字各有分別因果者以前之所因而得今日之果證果者以今之所證而得當下之果果字又有二義一是果決之果一是果報之果此處應以果決解蓋四果菩薩俱從勇猛精進而堅修以得之者入流一往來諸名正是證果處何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹何故人住六塵即滯凡流不則入聖流更無別法為所入彼初悟道果者已斷見惑離四趣生故脫凡流而入於聖賢之流究之何所謂流便是入焉俱化不著一念知入於此實無所得入流之心只見塵緣可畏而絶念不入六塵不淨境界則煩惱不著弗逆聖流但我相未忘此須陀洹之所以名也此是一菩薩是初入佛門者須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含次詰云汝意若何二果之人能作是般若之念我得二果否答以無所取而自成何故欲界有九品思惑二果之人較之初果則已進矣名一往來者凡人於塵相有一往而不來有既來而復往者此則曾於其中一往來而絶無顧戀實無往來但人相猶存斯陀含之二果無得也此是二菩薩須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含又詰云汝意若何三果之人能作如是般若之念我得三果否答以無所取而證果何故三果之人已悟人法俱空念念不退菩提較第二果則又進矣於六塵四相一一證空通徹前後了無障礙不特不往直覺塵相無可來之迹而實無不來者心空無我不作念有不來法不知得是果是阿那含之所以名也然衆生見未為遣盡阿那含之二果無得也此是三菩薩須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊再詰云汝意若何四果聖人能作如是般若之念我得四果道否了悟所學道幾有得故不言得果竟言得道果通於四阿羅漢獨稱道者以得盡無生二智聲聞道極故謂之道今問自知得四果道否答言無所取而得道何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者阿羅漢此言無學謂無法可學也較之第三果則更進矣何故名無學諸漏已盡無復煩惱雖名為阿羅漢似於壽者見或未盡除然實無有法名阿羅漢情無逆順智境俱亡蓋見道而不著於道也再啓世尊而反言之若使其見道而有所著止成阿羅漢之道而已豈能脫此四相哉即為著句是反言以見念不可著則前三果若作念云我得須陀洹等果亦即著我人等相矣此可類推也作念云我得此果即是著相著相即是取有所取即是有為今言不作念不著相乃是得而無得無所取而謂之無為也看一法字總前四果皆法也看一道字見前四果未證道也世尊佛説我得無諍三昧人中最為第一是第一離欲阿羅漢世尊我不作是念我是離欲阿羅漢此引自己所證離著以所得無為則同面彼自取證有差別耳述告世尊云佛於往日曾稱我獨得無諍凡人一念要明理又一念要祛欲兩念相爭便內自諍矣無諍則理欲消亡不起諍念三昧者梵語譯之為正定人心不能覺則昧正其覺則正其昧矣以其所覺而正其不覺是為三昧非入神之稱也十大弟子各有一長皆為第一如阿難多聞目連神通皆是於此三昧人中稱我為最第一不但是三昧人中作第一等人亦於諸離欲羅漢中稱為第一大羅漢也細微四相不生愛染不著外無欲境內無欲心已離欲界而至於無諍便是與欲相離故謂離欲道得於己情欲盡絶又四果之進級此佛平日讚善現之言善現謂佛雖如是許我我實不作是念云我是離欲得道果之人與前四果同除所得心者世尊我若作是念我得阿羅漢道世尊則不説須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行我者善現自稱須菩提亦善現自稱也阿蘭那此云寂靜相盡於外心息於內內外俱寂何時不靜即無諍之異名樂阿蘭那行者好為無諍而見於行也再啓世尊而反言之假若我起意思我得阿羅漢道即著離欲之想得心未除便有凡心妄念世尊必輕鄙之於諸弟子中定不稱我是好樂無諍之行者萌之於心曰念見之於事曰行又正言之曰以我雖有是行而實無所行其離欲之心此照前不作是念不謂得道乃心之無著無得然後稱説我得無諍樂而行之者此段是善現因聞四果自述以無心而得離欲之果以就正於佛也則上四果亦以無心而得愈明矣要之四果無取無得只此不入六塵功夫到絶頂處便是無上菩提也莊嚴淨土分第十如來自色之一法至菩薩涅槃皆不生所住之心則於阿耨菩提不見有所得於佛土不見有莊嚴猶無相法身隱於諸相雖須彌山王之大不可得比矣如無所得之得非莊嚴之莊嚴無以異也佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得上説得果便著一得相故又將己所得問是試善現認真得字否恐疑佛有師傳因先使之自思再從當身指點云我往昔在師處聽法師必有法開示不知果有法可得否善現答以法無所得蓋法以發人清淨心如來本自清淨於本性中自得真悟即在然燈佛所不過以心印心不專靠師之授記而得心若有得即是住相不能清淨豈如來而有所得也耶然燈是定光佛即世尊授記師生時有光於眼耳口鼻百孔中放出遍照十方如燈之明至成佛時遂名然燈八王子皆師妙光得道而最後成佛者然燈十六王子出家為沙彌皆得如來之慧最後者釋迦牟尼是則世尊得無上菩提法為諸釋法王於法寧無所得第不存所得心耳須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴上説然燈因想諸佛現身説法或尚莊嚴佛土佛土喻菩提本念莊嚴喻心之清淨無邪妄牽擾也佛問菩薩果以入定無倚而具此菩提心否乎善現會意答云實無此心也何故無此心莊嚴者心入於定而不著依倚也佛土二字是就菩提心入定者言人於操心時存一分矜持心意便不定説到入定心無可持正所謂無為法也心言土者方寸之地本是良田不侵削而加滋培何在非佛土凡言即非者皆為無異乃破相顯理凡言是名者皆為虗聲乃就事顯理原佛所説莊嚴之意原無此莊嚴之想故謂即非莊嚴特名之為莊嚴耳是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心上文得無所得而莊嚴之想俱無此心幾於枯稿故此段説一生字以見諸想皆空而心從虗中生出凡須菩提等應如是而生此清淨心心至清淨則六塵俱斷又何有於色聲香味觸法以住其心清淨心言生六塵亦言生二生字有別上生字言心中一無罣礙而生此心下生字因六塵所染而心反為其所生應與不應一勉一戒正相照應無所住心中毫無執著也八字連讀不言心之生而言生其心者正以心本虗靈原存生生之理特為情欲所制生機漸消人於一念不起時反觀內照覺得此心有油然而生者非他心其心也應無所住句全是心之覺處生之無所住者心中盡是覺處不應的走不得來躲閃便在在皆明覺之生心靈光透出何生之非其心須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛説非身是名大身因上人心清淨則其心大矣惟人有此大心可譬有此大身非反説到外也身字即作心字看佛欲廣善現之心而復以身如須彌山王為問善現即悟佛意色身雖如須彌山王皆是法身顯化故應曰甚大謂人心大有如身大也恐衆生不悟遂自闡揚之曰何為信有大身蓋佛自説清淨心充滿六虗乃生心之妙用非説身軀之身法界為身無有形將豈須彌山王足喻哉非身即無相二字法身也亦即清淨真心也人不清淨其心而染於六塵不為小其身乎以其遠離諸垢名之為非以其尊崇奇特名之為大然非心無住著何以得此須彌西域山名猶云妙高四寶所成曰妙突出衆峯曰高此山為四天下中最大廣三百六十六萬里為衆山之長故稱山王人身豈有如是之大世尊欲人從色身中悟法身故托此為問蓋以須彌為衆山之尊法身亦為衆身之尊也此段問答言無所得無有莊嚴而至於心無所住則此心方為廣大此又佛開悟善現一則也無為福勝分第十一此即莊嚴分不盡之詞謂七寶施不免生心住相若受持般若於心無所生於相無所住是謂無為福勝須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人説而此福德勝前福德四果以下至非身大身節節言佛法不可取既法不可取則持經有何利益故此第二番又較量經勝以見持説之不空也上言山此言河俱是喻説此段甚言世界之多恆河者西國祇桓精舍側近之河從阿耨池東西流出周四十里如來説法常因衆見而取此為喻也佛問如恆河中所有許多沙數如是一粒沙等類一恆河於汝意下若何是諸多恆河沙寧為多否欲令善現先悟此沙之多為下文張本善現會佛意如來不是妄説佛具正遍知照見盡虗空遍法界故先答言甚多世尊但一沙一恆河諸恆河尚然無可算數何況諸恆河中所有之沙又可算數耶佛呼善現此喻非是謊言而可實信我今實言告汝上泛言物情今説作福事故為實言以如是沙類諸恆河諸恆河中所有之沙一沙等一世界其世界之多又何如若善男女以七寶滿此世界布施於人其布施之多何如得福之多何如前只滿世界今滿河沙世界尤無數矣亦無是理只甚言其得福善現會佛意恆河沙固不可勝數又況一沙是一恆河又是一世界如此布施其得福豈不甚多佛告善現若有善男女受持隨分四句偈等為他人解説經義使之明悟此福德歷劫常存勝前寶施著相之福德也前説於此經中受持乃至四句偈等此説於此經中乃至受持四句偈等有別前兼説經此單説偈見得以四句偈與人説其福尚然無量則持全經者又不知何如矣蓋布施必待七寶而得福若經與經中之偈則不論貴賤貧富隨人皆可持説也世人住相布施建塔造廟莊嚴佛土只為福德之念不清不知財寶布施無論一大千世界即無量大千之寶施不出六塵總屬有為不若此經四句自利利人照徹本來面目彼此可超生死成無上道也尊重正教分第十二一是恭敬其説法之處一是恭敬其受法之人一是恭敬其藏經之所是為尊重正教復次須菩提隨説是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟既言持經福勝當知經可尊重故復次及之受持解説不論何地若隨地而説此經乃至者下及之辭等者綜貫之義般若無多舉一便該全旨故四句可以度生此處雖謂有經之處却謂此心也以清淨心説法即生人清淨心一切世間存有為之心如天上之神世間之人及八部鬼神中凶狠之阿修羅欲求化度正當生恭敬心而供養之視説經之人巍巍高顯如舍利所藏之塔奕奕莊嚴如佛像所居之廟而無不瞻禮也人但恭敬塔廟而不恭敬説法之人殊不知説法之人便是法身即為塔廟可不尊敬耶阿修羅魔王名即羅剎國之主有大神力能與如來之法相敵者如來説法時作比丘相而至如來能以慧眼覷破阿修羅無可施其魔力遂反邪歸正所以此經每説一切天人阿修羅正從此時證果者何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處即為有佛若尊重弟子善言妙義與心相會如膏助火心觀益明故此分加讀誦二字承上言隨説少許尚感得天人供養何況於此一經全文盡能受持坐則對卷而讀行則釋卷而誦其為天人阿修羅所供養者更當何如也則知是人見性無疑成就最上第一乘出世希有之法更當何如恭敬乎此言其人也且不獨説經與持誦若是經典所在之處隨何方所便同如來身歷之地而佛無不在不特佛在并持戒修福而為人所尊重之弟子如菩薩摩訶薩亦無不在矣而可不崇敬乎哉上從説經處以及持經之人自四句以及全經是由淺入深也此從持經之人以及經所在處自成就佛菩薩以及有佛與弟子是由深而又淺也總反覆發明經勝如法受持分第十三般若非般若名相空也説法無所説法相空也塵界非塵界世相空也身相非身相我相空也一切皆空方從經義解脫是謂如法受持爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛説般若波羅蜜即非般若波羅蜜是名般若波羅蜜上説經典如此之妙善現因問此經當以何名若有經名我等何以敬奉而心持之佛告其經之名則名為金剛般若波羅蜜謂用堅固之智慧出生死苦海而以一性和衆性是此經之大旨金剛所擬物無不碎智慧所照物無不空所以名為金剛般若凡人智慧之性從無始而具不著漸染如金之出火純潔而無夾雜此時私欲不入何等堅剛一為私欲軀遣便柔軟而失其本然不得登岸矣惟率其最初而堅持固有之智慧不使少有虧欠則回頭是岸以此名義汝當奉持於心然其所以行此奉持者何哉言出於口雖是佛説止為口説而已必有默傳此心超出言表者法相本空不可取著一名字相況究實言之只奉持其心行住坐臥弗令昏昧何有般若可名蓋學無要領則泛而無歸知有統宗又執而不化故曰即非般若波羅蜜為奉持之故於無名中強立名為般若波羅蜜并般若而空之也固知經可定名經中之法不可名法可師授法之為理不能授也即非者掃迹之談是名者本具之義須菩提於意云何如來有所説法不須菩提白佛言世尊如來無所説名相盡掃則智障悉空智障既空尤當并空言相般若波羅蜜之名既為贅語則又何有般若波羅蜜之法可以言説也哉佛慮善現疑有名字該奉持則如來有所説法了故又以此詰之而善現了知説即無説乃答云般若無法可得如來亦不能以文字而説也如來秪是傳心何曾説法會得箇中則名亡説泯經義全彰言相何可執也須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來説非微塵是名微塵如來説世界非世界是名世界言相不可執則器界相亦何可執因惟難説之理先使其思今以物之至細至大者觀之衆生性中妄念如三千大千世界中所有纖微塵埃何處不有是為名否乎善現會佛意世界喻法身微塵喻妄念即答言甚多一切衆生被妄念微塵遮蔽佛性不得解脫若妄念得盡便現真如矣佛又呼善現謂般若所以為金剛者為不同於塵界及色身也不知微塵雖多以清淨心對之無非虗妄之散布變幻無常體非真實但據形色名之為微塵耳是微塵可説而微塵之理無可説也佛説世界世界雖大以明眼人觀之只是虗妄之結聚劫數窮盡終有混沌亦非真實但據迹象名之為世界耳是世界可説而世界之理不可説也微塵該盡宇內人物世界該盡天地始終此外更有何説上句形起下句重世界一邊須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來説三十二相即是非相是名三十二相器界相既不可執如來之身相亦豈可執乎佛將三十二相現身説法又呼善現汝意如來所修三十二相為實相否善現會意佛雖由於四大凝成現三十二相報身至涅槃考終同歸烏有故言弗也相是色身不可以此得見真佛此如來謂真性佛也下如來説三十二相則謂色身佛也何以故是三十二相者只就如來幻身言之耳此身雖與衆生不同而究竟色身終屬幻形難久住世是非真實相特強名為相是佛身可説而佛身之理無可説也乃知一住著即經義亦非般若一解脫即報身器界無非般若波羅以是心持經方為淨信又何必捐身棄世以求度脫生死乎此與上節大意謂細而微塵大而世界妙而佛之色身皆虗妄名亦應上無有定法如來可説也三十二相一身相修廣莊嚴容儀端整二體相上下等量齊肅三面相如一輪滿望日之月光彩可尋四頂相高顯周圓形如天蓋五髮相右旋盤曲一絲不亂六耳相低垂過肩七眉相灣環淨皎如弓中高而兩垂八眉毫相間有白毫柔軟若綿又如珂雪九眼相睫相紺青而美色平整若牛之長眼大而左右齊整不偏十眼睛相色青鮮白而眶環微紅十一鼻相豐高而下垂十二脣相潤若丹朱十三口相閉若瓠形開若海口十四牙相上下四十肉深根固整齊平淨而密十五齒相四齒潔白鋒利十六舌相廣薄修長吐垂面輪至耳髮際十七音聲相梵音詞韻和雅而衆聞十八額相方正隆準十九肩相平正圓滿與項相稱二十項相實而厚二十一背相盎然周正充滿廣豐二十二腰相鯁直有威二十三手相十指尖圓纖長豐白骨節柔軟若綿二十四臂相平立垂可摩膝如象王鼻二十五脅相兩肋圍抱如鹿之腨攝二十六毛相皮上每孔生一毛青宛如絲軟如兜羅二十七皮相望之金光晃耀肌理細潤不住垢膩二十八乳相凝實不枯二十九臍相窅深可容細果三十足相兩底平滿下有千輪輻文三十一足指間有雁紋狀若綺畫三十二足趾廣長坐與趺相稱趺與距相稱須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人説其福甚多善現但知身相不可取未知身相亦不當捨今人具有幻形或能空其相故又呼善現若有善男女欲求了悟以為捨此有漏之身可得無生之理於是敲骨擊髓投岩赴火刎頸割肉燃指卸臂將此身命如恆河沙等以為布施身施如尸毗王之代鴿命施如薩埵之飼虎如此種種可為極矣若復有人將此般若經義受持於己開導他人比之捨身命者其所得靜妙福德不更多哉蓋身命之捨終有盡日而修性之功歷劫常存思及於此真不可説也此第三番較量持經離相寂滅分第十四須菩提於此感悟復歎後五百歲有信解受持般若者決不為四相所纏既離諸相即名為佛佛云不惟信解但聞此般若不生驚怖已自希有復引因中以持般若故得離諸相雖遭割截了無嗔恨復引不生心不住法及入暗處明之喻此分名離相寂滅旨哉爾時須菩提聞説是經深解義趣涕淚悲泣而白佛言希有世尊佛説如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德自此至十六分總明受持之難功德之大也深解大徹悟也善現知捨身命所感之福不如持説之勝遂悟真空無相義趣感佛恩深不勝欣喜之至故反流涕發悲讚言希有世尊佛説如是般若甚深經典我從昔日受教以來夙植善根所得如來慧眼於無上菩提覿面成迷自傷所聞之晚昔未聞而今聞二句正涕泣心事也善現是阿羅漢於五百弟子中解空第一豈不聞如是深法況世尊説時聞者不少只恐聲聞小乘聞而未必能信故以此策勵同學謂信心而有善根清淨而却六塵便是無相之相則生實相信經如何能生實相以經所詮皆無相之理因經修證離妄去執諸相亡而實相見矣當知是人成就出世大事功成果滿故言功而不言福豈非第一希有乎第一即無上菩提也世尊是實相者即是非相是故如來説名實相因説實相隨遣之以表奉持是實相者不過借以生空相之資其實理以無相為真欲人反求諸心故曰實相究非有執著之相此如來平日之名言非我今日之臆説故又引以證之世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人即為第一希有何以故此人無我相無人相無衆生相無壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相即名諸佛信解者信其義而曉解受持者受其義而持行不足為難者起下希有之詞言我今身親值佛獲聞如是般若經典親見如來印證信解受持不足以為難聞而未來衆生不得遇佛能依是法即為希有前云成就此言即為正以末世能信尤可快也蓋佛在之日雖有中下根基能往問佛佛即隨宜開示無不契悟佛滅度後後五百歲去聖遙遠但存言教人若有疑無處咨決於此時中無緣面授僅得耳傳清心敬信自解自悟是最上根器較之我聞最為難得何以信經之人得為希有以此人依此經修行盡離妄識已是超脫四相也所以無四相者何哉了悟四相俱妄想不是本來心故曰即是非相非猶無也非相即實相也何故非相宜去蓋佛以覺言外覺離一切有相內覺離一切空相於相離相於空離空得真空無相之妙故即名之為諸佛中人佛非第一希有乎佛告須菩提如是如是丞稱如是是接引世人意不但以其言之是也若復有人得聞是經不驚不怖不畏當知是人甚為希有大乘之法非大乘根器猝聞諸相不生言下即佛之説未免一往怪愕而驚進退張皇而怖恐懼阻難而畏因䇿勵後世學者若復有人信心清淨得聞此理歡喜受持如有夙契而不驚若曾行習而不怖勇猛承當而不畏此人悟入法門速離衆生下劣之見非久種善根安能直造如來第一義諦則豈非甚為希有乎蓋實難其人也以下通説後世持經之人反覆申明在無實無虗句結穴後説以要言之而不説要言在何句者佛不以一句實法生後人執著也何以故須菩提如來説第一波羅蜜即非第一波羅蜜是名第一波羅蜜承上言何故不驚怖畏得為希有蓋以此經為萬法宗源凡經皆從此一經會出諸法波羅蜜皆無以尚之是為第一波羅蜜然是人正無第一相也心中若存第一相便落二三小乘不為第一希有矣如來嘗説第一波羅蜜非有第一相所以名為第一波羅蜜前曰佛説般若波羅蜜重在般若此云如來説第一波羅蜜重在第一前曰即非般若波羅蜜并般若而遣之此云即非第一波羅蜜并第一而遣之也此又空善現第一相也以上皆論智慧須菩提忍辱波羅蜜如來説非忍辱波羅蜜智慧必從實行證驗始真故又告之曰人聞第一波羅蜜而不驚怖畏者法相空也又不若試之利害生死而證人相之亦空也即如辱之所在人不能忍而有忍之者是即入法之一門故如來説忍念皆去辱自消亡而何有忍辱相乎遇值嶮巇恁地平平打過方是真降伏李屠諸本俱無是名句何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨何故忍辱如無人之於辱不惟能忍為難而能忘則尤難因自舉歷劫修行事證之佛有時自稱佛自稱如來自稱我我特謂我身如來與佛則謂己與諸佛如來皆然經中盡如是也佛三世轉身為如來歌利事在第一世受記於然燈在第二世如我昔為十一字為句蓋借此以證忍辱并忍辱皆忘之意乃見割截於王非佛身自為王也割截即下支解割至耳鼻截及手足辱斯甚矣而佛能忍毫不起四相之見蓋五蘊本空縱患害相加如吹光割水湛然不動此段是正説因自問此何故哉又反言之曰我昔支解時若有四相則瞋恨往往而生冤魂相報莽撞投生不復更去修行矣所以無四相者忘其辱并忘其忍也須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相不特此時為然從今追念前生五百世入山求靜作忍辱仙人於爾所世佛所歷之世亦善現歷過者又正言之曰此時早無我人等相認為宿世應受之報乃不昏亂真性托生再修是忍辱之證後人修行者亦宜如是見苦是苦由於我相不化若離我相則誰為辱者誰為忍者身空則無痛者心空則無覺痛者不見為苦自然成忍也上是引己以證此又引多生以證然則如來之無瞋恨久矣豈偶一能之者哉是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心此承上無相之故來佛纍世行忍辱行以無我故得成菩提故凡修行菩薩於一切相盡應解脫而離之發無上道心不應住色聲等相生希求福利之心蓋無上正等正覺心乃清淨無相心豈可染於六塵住色者眼前美好屋宇器用服色之類聲香五者謂凡音樂馨香滋味感觸事情利己者凡住著處皆不起念收上兩句應前離一切句兩應字兩不應字甚著力此是故及下是故與上數何以故緊相呼應此意已見四分十分中復詳言之者恐弟子聽之不審或有續來聽者經中重疊處義皆如此若心有住即為非住前是正言此又反言之若心中稍有所住此心終為六塵把持則妄念紛馳已著諸相取捨愛憎無有休期便落人天小果不證無上菩提何有住足之處所謂應無所住而生其心者此也上四住作住著住字末一住作住止住字是故佛説菩薩心不應住色布施須菩提菩薩為利益一切衆生故應如是布施論修行人之心亦應無住菩薩所行六度皆應離相色為六塵之首施為六度之初故云不應住色布施五識皆因色相而起故此止以一色總該無住如是行施欲使含靈抱識盡被恩澤各得無相之體即前所云滅度無量衆生實無滅度者不度而度乃所以深為利益也菩薩為普度衆生而以布施利濟益物原為人而不為己則知不當復有嗔恨應如是以我無住之法而布施之耳若存施受之心即非無住矣如來説一切諸相即是非相又説一切衆生即非衆生即以如來之説證之一切人我諸相俱非真實盡是空華故不應住又説一切衆生盡是假名不見佛性名為衆生若離妄心見自性佛即無衆生可得故不應住相布施下二句是明上二句之所以也蓋以衆生若有則説不得諸相為無若衆生既無則諸相之無益可知矣須菩提如來是真語者實語者如語者不誑語者不異語者此如來之語人不信心則以為妄孰知其真故不偽而切人實故不虗而有據皆適如其心之所言而不加毫末不減分寸不以虗誑之言而使人惑不以異同之言而使人疑蓋以破衆心之狐疑也此泛説平日如來所有的話皆一一可信如此則又何疑於持經證果之言為不然乎須菩提如來所得法此法無實無虗向云如來無所得今云如來所得法即前無相無住之謂數語即法之所在此所説之法真體常存以為實耶而六塵四相皆空以為虗耶而四果所得皆有無實故不住於有無虗故不住於空非空非有執情盡化乃為真得虗實合説虗中想出實際實中想出虗理靠不得實著不得虗虗實相形乃成如來妙法須菩提若菩薩心住於法而行布施如人入暗即無所見無實無虗之法佛已説出要領故又言若悟得此法則無所住之心在在皆然矣即以布施言布施謂法施教化衆生也若菩薩自家修行心住於法而又以此行於布施心為法所拘彼此都受法障即以貪愛自蔽其明矣便如人入暗中有何所見此行法之失也若菩薩心不住法而行布施如人有目日光明照見種種色若自心不住於法而又以此無住者行其布施則觸處皆通無有障礙便如人之有目加以日光照之秋毫皆矚何色不見此色字與六塵之色不同滿眼乾坤山河大地無非是色故謂種種色此言法之所在必能空而後能照甚言執法者之不得法也須菩提當來之世若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德汝計末法無傳豈知不解脫則此經是文字能解脫即是佛智慧如來用此啓發後人者專望流通之人當來之世邪法競起正法難行若有善男女得遇此經從師稟受誦讀精進非由口耳之傳直究心學這便真正是能了何愧如來證果即是一佛出世如來豈庸釋我無論世遠於五百歲以自心之佛智慧照見自心未有不洞徹者以此流通佛法豈不成就作佛功德乎無量者不可稱量非特利一身將普施羣生無邊者無有邊際非特利一時且遍千萬億劫也言人能如此則人人可為如來世世見有如來故説功德之無窮耳受持四字相因欲受其文故讀欲持其義故誦如來悉知見示非臆説也持經功德分第十五如來謂此般若章句專為發大乘心者説又能三時受持即是負荷菩提良器其樂小法著四相者烏足語此又謂此般若章句在處即是佛塔天人圍繞豈過分哉故云持經功德須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解説此第四番較量持説福德也初日分者早晨中日分者日午後日分者晚間日有六時舉此以該終日耳恆河沙及無量劫俱借言蓋身命人所最重以此為施比七寶施尤甚矣故佛呼善現而言若有善男女於一日三時中以身命布施如恆河沙之多且歷百千萬億劫之久其布施之願極矣若人能以其心實信此經而無違逆其受出世福已勝彼身命之施何況書寫傳布行解相應而受勇猛精進而持心不散亂而讀見性不迷而誦兼以為人解説化導多方捨身豈能及之耶此較前加書寫二字欲人利導以廣濟度也佛恐人執著如來忍辱之説徒以身施於己性人性毫無利益故十三分已言之此復救其失也人不悟道欲破生死捨財不已至捨身命不知捨身修福不如施法修慧縱三時捨身都是住相布施有何利益若聞般若經典信之於心不逆於理以之自度則超生死得涅槃福已勝彼三時布施何況受持讀誦之餘加以書寫解説廣為流傳以之度生而成無上道者乎須菩提以要言之是經有不可思議不可稱量無邊功德承上文來三時捨身亦是有盡之言若據實理而以經義之簡約者言之説經之要原自無多過心境界不可思惟過言境界不可擬議不可名物稱不可淺深量其中有大無邊際及人功德然則前云身命之施尚在思議稱量有邊之域烏足與此較哉如來為發大乘者説為發最上乘者説若有人能受持讀誦廣為人説如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等即為荷擔如來阿耨多羅三藐三菩提何言乎經之功德此經如來非為修因種福説專為發度己度人之大乘心像車乘之大普載一切衆生者説亦非為權淺之大乘説為發菩薩阿羅漢等登大乘之最上乘心者説大乘者諸菩薩是也為大乘説者説此六塵四相之應空而入於法也最上乘者佛如來是也為最上乘説者説此空相之心皆歸於空而并無所謂法也第一句是引衆生而證入諸菩薩第二句是引諸菩薩而證入於佛如來也此正以要言之之意乘取通遠之義乘有輪始可轉行故以法為法輪諸經皆謂大乘者取法輪轉通之義也若有最上機發大心之人能持誦廣説則其所知見與如來合體如來自悉知其所知悉見其所見超情量絶名稱直入不思議地成就者滿足之意此再述前言以見其必然也如是人等即為大乘最上乘之法器荷擔自性如來在身內而共成無上菩提必至物我一時解脫方捨此擔也背之所負曰荷肩之所承曰擔此應前即為如來也如來所以將此經啓發此人使繼往開來而諸佛賴之也其所成就何如乎世間上乘之人入聖至易中材之人超凡最難故佛往往從第一等佛菩薩直説到學為佛菩薩者是成就中材不使其恍惚無據也佛家三乘一曰聲聞乘羅漢得道全仗佛語指示為聲聞二曰緣覺乘辟支佛得道緣己感觸而心悟是佛緣特達為緣覺三曰菩薩乘能修六度已為佛矣此則通修萬行功非為己志在廣濟故以大道為名是登大乘何以故須菩提若樂小法者著我見人見衆生見壽者見即於此經不能聽受讀誦為人解説此反結上文以明大乘最上乘之旨也何以見其荷擔之故若鈍根下劣之徒為聲聞緣覺其所好樂不脫於小乘法不發大心而沾沾章句之末即為妄著四見毋論能持且不樂聽受讀誦寧得於如來深法解説以度人耶則信此經非易語而菩提非易擔矣此言其人也須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處即為是塔皆應恭敬作禮圍繞以諸華香而散其處然荷擔之人不易得則經宜護持以待後之能信者故囑善現云衆生果能因經悟此法性便是心上工夫所在之處不一若有此經一切天神世人凶神抱有為之心求解脫者固應敬事崇奉此經當知此般若經卷所在之處如牟尼寶珠瑞光輝映即為如來法身舍利寶塔發心菩薩豈不皆應恭敬而以清淨心供養皈依頂禮環繞拜頌而以清淨身供養四撒華香而以清淨物供養也華香散處即所謂恭敬之文也持經功德不亦大乎能淨業障分第十六佛謂受持之人以今生輕賤之微垢能易當墮惡道之重愆復引因中供養諸佛之功不如末世受持般若少分之福故云能淨業障復次須菩提若善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅當得阿耨多羅三藐三菩提此特説出果報為下乘人開自新法也世人喜惡嫉善一見是人為人輕賤便謂受持無益福報虗語使人生退轉心不知輕賤亦忍辱中事故佛言持經之人該天人恭敬或因疾患貧窮衰老反被世人輕賤何哉佛申明之曰是人雖今生無業或宿世業重應墮地獄等惡道以今生持經力止為人輕賤罵辱前生大過即為消除時雖忍辱力加進修當證無上佛果持經功德可謂大矣豈可因輕賤而隳精進哉須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及此第五番佛舉自行較量福勝以見經不可不持也阿僧祇無數也那由他甚無數也言此時之佛實有千千萬萬耳佛自追思前生於過去無量劫數未遇然燈佛之前此時無此經典求道甚難得相值百千萬億之佛悉皆敬奉承事之與之參究宗旨而無一人空過不與説明此經義者今有此經非法非非法若復有修行之人於後末世雖目中不見有諸佛只須受持讀誦會諸佛之源從自心性一日了悟則較我歷劫事佛之功德彼得一分勝於我之百分彼得百分勝於我之千分豈算數譬喻如微塵恆河沙等所可及哉用力何其省而悟道何其易也供佛雖感福報但是事相終屬有盡況供養承事無關自性自性若迷福無可救若持經則能生理解得證菩提故供佛雖多總不及持經者百分中一分千分萬分億分中一分也上節為罪重者説以持經力罪滅之後漸漸修行方得成佛此節為無罪者説故因經力一悟本性遂超入如來地也須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具説者或有人聞心則狂亂狐疑不信此結上文也再言其人深寓屬望之意此經非大乘根器不能持誦末法衆生德薄垢重嫉妬彌深若善男女於此時中受持讀誦心求真諦超登覺岸所得自性功德在人神悟豈容辭説而使人可聞乎具者詳盡之義與上以要言之相反如來非不欲詳晣言之無如下乘之人便謂如來與上乘説者又與下乘不同則將疑如來不一其説其心因入於狂亂以致如來之經反生狐疑而不信所以不欲具説耳狐性多疑惑每渡河氷且聽且渡故曰狐疑須菩提當知是經義不可思議果報亦不可思議義者般若妙義即性體也果者如華結實報者如響應聲言理之必然也自此已後讚較都絶故此結上無住無相之妙又結上佛不具説之旨餘所較量但是別意斷疑與前次第不同此處果字加一報字與前四果果字不同前説得深此説得淺前是自證自果此則以果得報此段全要發出下愚自新求善而又恐其為善不卒以致狂亂狐疑故以果報結之是如來開導庸愚一片婆心也究竟無我分第十七善現復理最初之問世尊亦如前答又引因中以無法可得契空有兩融故蒙然燈授記作佛使我當時有少法可得則不與我授記矣必至通達無我法始是真菩薩故為究竟無我爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心應云何住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者自此至末偏重法空總欲淘汰二乘人所得心遣除凡夫業福心故每説經一番問以較福一番也降住之法佛前此已為詳答何必再請蓋善現見佛所説皆破除我執無佛可求無生可度未嘗實言何處可以住心何法可以降心將令初發心菩薩茫無住向又自前身相見如來下十段總説無我謂除却我則誰為住心降心若有住心降心則又乖無我之義所以因上不可思議覆思前所問住伏之説亦不可思議而又申明無我之旨也不知人我之相不立即無降伏之降伏得法之想不生即無安住之安住故下仍以無生可度無法可得告之佛告以下是答住心人惟一點靈心運用凡發菩提心者何嘗有我當生如是無我之心謂我當化度一切卵胎濕化等衆生出於輪回已盡也度生那有盡時一度即有一己即化度之盡只了得我性作用豈可於清淨虗空中妄生執著而起一衆生可度之心及我能度之之念乎何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩以何義故普度衆生而不起衆生念耶若有滅度念謂我得度生之法人得我法而度衆生得我法而度生生不已之衆生俱得我法而度則私心未絶執而不化四相總成一我何能伏住而名菩薩清淨心乎所以者何須菩提實無有法發阿耨多羅三藐三菩提心者所以不能破除四相者何前説當生如是心似發心有法豈知真性虗空原無有菩提心心既強名發豈有法非徒無一切衆生即發此度生之菩提心亦不可得菩提心不可得又安有可住可降之心乎發菩提心之法不可得又安有住心降心之法乎住心降心之法且無則所謂我者安在而無我之旨益明矣須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所説義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是如來佛自謂也然燈以下歷舉如來無得法之果以明學者無得法之因如來以昔在師所有法得菩提為問善現深解無相之理故言弗也所説義義字指上實無有法句謂從心自發外心無法有何所得正悟如來之得法得之於心不執師之法以為有得佛然其説重言如是以印可之不但稱其言之是而謂我之所得真在心而不著於師之説耳此皆無我意須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛即不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義此反覆告之者欲善現知法無所得也覺本非發何況有法諦審於是乃知人法俱空一念不起是為真降伏耳佛深當意故隨順善現所説而先正言其實無所得凡僧初入門祝髮其師訓言曰授記然燈沒後即是來世非兩人又隔世代也如來法法皆空心心無住謂我若得法為來世化度衆生之人此時授記師應以法傳我令今世就成佛道即不以我為來世當得作佛而有佛之名號矣釋迦此云能仁言能以至仁之心而普度一切也牟尼此云圓通言有此普度一切之心而能圓通四大靡所不遍毫無窒礙也當日命名之意如此已上蓋反言之也又正言之曰我惟不存一得法心所以授記時師曾作是當得作佛之言而以釋迦牟尼名之然燈但作是言則知然燈自成然燈釋迦自成釋迦實無有法可授受明矣此正結引證意總無無上菩提心從心自發而已所謂無法得者何以見其無所得諸法千條萬緒而其一貫之旨總歸於如言如義而不言如法如如中著不得法相也言諸法而同歸於如義正是百川之流銷歸大海不見增益又何有一法之可獨名乎當生如是心至此是前後照應若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗此反覆推明以釋人疑也得者自外而得真性豈由外得哉言如來得菩提者不過凡人之言耳如來實無有法得菩提也故呼而告之以正人言之妄然不可謂如來不得菩提但得之於真性性本無法故其中據以為實則全無憑藉見以為虗則觸處圓通無實無虗法安所施前無實無虗是言如來所得之無相此無實無虗是言如來豎義之無法是故如來説一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法因是之故即以如來平日所言證之天下之可恃者皆法也法至一切則無論大小何處不是修行成佛之法不必於諸法外另覓菩提也此釋諸法如義佛又恐人泥法故呼善現所言一切法者假此修行不得認為真實有所得則不用之原無有實不過是虗名耳不可於諸法之內執有菩提也人可泥法而不知真性乎須菩提譬如人身長大須菩提言世尊如來説人身長大即為非大身是名大身此承上起下之辭人身長大喻一切法之多法非真有可譬前云人身等須彌山之長大善現會無實無虗之意謂如來所説人身長大祇是幻形豈有真實大身惟此清淨無為之心離一切相遍一切處是法身大功德無量是報身大是名大身耳明大身非身則無實無虗愈可知矣此性不明雖有長大之身終為虗殼以喻雖有一切法而不能得之於心則一切法總屬成法非我獨得之真諦矣須菩提菩薩亦如是若作是言我當滅度無量衆生即不名菩薩前言如來無滅度法恐人以佛為然而菩薩未必然故呼善現云如來無法得記菩薩亦當無法度生然菩薩之果亦豈真實也耶不過如大身之虗妄徒有其名而已蓋以菩薩通乎佛性所差一間若使菩薩作是言謂我當化度無量之衆生便是執於化度之法而不可名之為菩薩矣以菩薩著相即是衆生也何以故須菩提實無有法名為菩薩是故佛説一切法無我無人無衆生無壽者須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來説莊嚴佛土者即非莊嚴是名莊嚴佛又自問何故一切衆生為有情不名覺衆生隨呼善現而自答云實無有法名覺衆生也修行賴有佛法此云實無有者謂非真性有之也又推其故佛説一切緣覺聲聞之法以除四相為主四相無而念中豈有滅度衆生之由我者言佛則菩薩之不落於化度法可知菩薩既不存化度心則心中清淨不為清淨所拘若菩薩作是言我當飾金寶於世間見有佛可取則滯於法相是凡夫之見不得名為菩薩矣此何故哉如來只説心為佛土清淨無相不假外飾若是觀想西方不達一真法界外飾即非莊嚴惟以定慧之寶莊嚴心之佛土乃是真相非虗名耳然佛土是假名莊嚴是假法則菩薩豈可作意莊嚴佛土哉須菩提若菩薩通達無我法者如來説名真是菩薩度衆生是大悲嚴佛土是大智皆菩薩分內事一作於念便非菩薩然則起何等心方名菩薩耶凡相皆是有我如度生著相歸功於我莊嚴著相徼福於我今曰無我法只前無相無住之説必也以天下之身為我不以一己之身為我而人無我當布施不惜己有以濟物當忍辱雖割肢體而無嗔而法亦無我觸處洞然而得心契圓融之妙者斯則如來稱名真正修行而可授記作佛耳章內三言非菩薩謂有我故此言真菩薩以足實無法得之旨法尚本無云何而求於住也世尊到此却把四相收為一我相要除四相只在通達無我下皆明我法意也上言六塵而單説色相以聲香等從色起也此言四相而獨説無我法以人衆壽皆從我而起也通達則彼此無礙便是一箇正覺心何所容其為法乎一體同觀分第十八前言五眼後説三心中云河妙佛世界所有衆生心如來悉知雖優劣善惡不同皆如三心不可得萬法歸一一更無異觀故此分名一體同觀須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼此答降伏上言無我而此以五眼問者眼亦我身之一官無我便應空眼相不知無我相者但無我身之纍非并其身而無之也身纍盡忘而我之慧性便從眼光透出所以有此五眼佛問五根一步説深一步善現答五眼一步見高一步要之五眼總是一眼分言之有淺深合言之無高下也肉眼者色身之眼人有色身即具此眼而或見正或見邪者此肉眼之所以相遠也凡人與如來同此眼而如來有之便能從此眼得證上果則謂如來之肉眼可也天眼者能普照衆生邪正若登高視下纖毫畢見此從肉眼證果後得之也慧眼者如來具三世慧光不徒見一己之生滅去來并晰衆生之種種色相此從天眼中看出法眼者所視一軌於法而非法之事不得再迷故如來曾以此眼看破阿修羅之假道亂真使反魔入正佛眼者見衆生皆可成佛而并無善惡之分正是開眼憫衆生合眼盡法界而無所不入其眼也須菩提於意云何如恆河中所有沙佛説是沙不如是世尊如來説是沙須菩提於意云何如一恆河中所有沙有如是沙等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊善現雖知如來具五眼而未知如來灼見衆生心而為眼故復問汝意作何理會恆河所有以下凡五層一河二沙三世界四衆生五衆生心也欲明衆生有種種妄念故舉無窮之沙以喻如恆河中沙佛説是沙否善現即答以是沙極細而無數故先言之佛又問汝意若何一恆河中沙沙類恆河謂一粒沙一箇恆河也如是則恆河不勝其多矣是許多恆河中所有之沙數是沙數多不可言諸佛世界又如諸恆河中之沙數是世界多不可言寧為多否善現即應以甚多佛世界謂一佛所設化之世界此起下文也佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來説諸心皆為非心是名為心上説世界多此則説人心多國土是世界中所分者蓋住心降心宜一切無心無心則無相寂若太虗烏可得而知若妄心即有形相故爾所國土中所有衆生衆生何其多一切衆生所具若干種難計數之心心又何其多欲明如來之智微妙能知故約所知之境廣多以顯如來所具五眼無不知見心數雖多總名妄心故云悉知此何以故而悉知如來説諸差別若干種心皆屬後起絶非清淨本心識得妄心非心是即心之所以名也干數也所以者何須菩提過去心不可得現在心不可得未來心不可得此釋非心之所以也前言若干心此止説三種心者見非心不外三種耳過去心者此事已過此心尚留便多眷戀顧惜終身迷惑而不悟也現在心者即如富貴貧賤各有其位不得越位而求人惟看不破以我當久於此則眷戀之心出矣又以我特暫於此而厭常之心又出矣故現在而莫知其為現也未來者此境不在目前而設一或然之想此境尚在後日而設一預期之端便多患得患失之心三箇不可得不是婉轉商量直是斬釘截鐵語也則夫著相心并有得有法度生莊嚴心俱不可有況所謂降伏哉應無所住而生其心者此也法界通化分第十九如來重引布施因緣所得福德皆虗妄非實雖所施之福多較之持般若無盡之福特泰山之毫末耳故云法界通化須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不説得福德多以福德無故如來説得福德多前説諸心非心乃知無心是為真心無福德是為真福德故揭出因緣二字并結十七分以下一支也因者因其舊也凡事必有因而後緣之以起因其善者即緣善而起因其惡者亦緣惡而萌人以滿大千世界寶施作如是善因結如是善果得少得多似有分寸故問得福多否前世是因今世是緣今世修因後世受緣故言如是凡是果德皆彼因成故施多得福亦多佛諭之曰世間福德緣會而生緣離則滅若能離却因緣方顯自性自性顯露是真實福德福德在性則不求而得無相無量如來不得言多有實非住著之謂蓋布施若關自性便不墮入頑空此已超過算數境界反説不得多了此二句説福德性也惟因緣果報極富貴繁華轉眼皆空生滅萬狀寶施之福不關自性縱施遍河沙於己性毫無利益是有而若無也因其有涯涘可測得計多寡所以如來説福德多福德尚不可得而欲得非心可乎知此則前非福德性及福德多明矣離色離相分第二十佛以具足色相問而善現了解空義皆云不可得見故世尊許之須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來説具足色身即非具足色身是名具足色身此與下結前身相三十二相節意也上説諸佛所證乃無為之法云何佛身有八十種隨形相好可見耶故有此問色身皮肉血氣之身具足者五體無缺少也佛有五體衆生亦有五體故言佛可以無所虧欠之肉身相見否言有此身見之者必生歡喜心也善現以隨其身形一一皆好終非真相故言弗也又謂此身不離肉身仍歸烏有佛性如虗空安得執此不可恃之色身以見如來耶此其故何哉蓋如來法身固非形色可見卒未嘗離於形色而不可見故云即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來説諸相具足即非具足是名諸相具足諸相是神通變現之相不止三十二相也不應以相見謂相亦非性也此何故哉如來所説諸相之具足從佛觀之亦是幻妄原非具足此具足之所以名也相到具足是為完人然貌足而性不全即非踐形之人與官之不全者何異如來發問意在掃除色相欲人於自性中求見真佛法身善現能悟佛旨即一切掃去則凡所有相皆是虗妄益明矣如來説出衆生色相之不可恃隨言已三十二相之亦無足據其旨歸於無相無法故下文即以無法申明之非説所説分第二十一解般若故通達無我法者名菩薩不解般若故有若干種心是名衆生然般若無説而説乃悲願深重隨感而應若有所説則謗佛也此理豈可為執相滯見者道哉須菩提汝勿謂如來作是念我當有所説法莫作是念何以故若人言如來有所説法即為謗佛不能解我所説故須菩提説法者無法可説是名説法上言無相此言無法蓋以法相名因故必相空而法亦空也佛言汝勿謂我先作是念將有所説法以度生使我先有是念便是我為法拘即人之聞我法者亦莫先作是聞法之念謂如來將有所説法而我今得聞之也此何故哉蓋無説而説説即無説若使其人不達是意而謂如來有所説法是徒惑於章句之末不明説經大旨即為謗佛不能解我所説無相般若之故矣然莫謂如來不説法也但真性難言無法可説即此是真説法不妨稱性而示也前如來無所説謂莫著言説相也此言如來無説處即是説謂莫著無説相也爾時慧命須菩提白佛言世尊頗有衆生於未來世聞説是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來説非衆生是名衆生上言説法與聞法者皆無法可恃則來世何所為據而使人信從耶善現是天生聰明以慧為命慧從性命中來不緣後起已得正覺故以是稱之謂佛説般若甚深人雖具亦不識説亦不信況末法駑劣之秋無佛開導從文字遺教中能信如來者可有其人否前章實信淨信指後日得道者言此信心是大凡修持之人故下文只論衆生佛曉之曰汝慮末法難信者執著衆生相也豈知衆生皆有佛性卵胎濕化諸種或有變化而脫於凡者一脫其凡便是登岸故不可以衆生名之亦不可以非衆生名之自問何故非不衆生蓋衆生之所以為衆生者我佛嘗謂汝等皆當作佛則非衆生可知是蓋泥其迹而名之為衆生耳則不必作衆生相也此結前無衆生相句凡佛自言而云如來説者謂諸佛亦如是説也見必能生信意惟世有信心之衆生由有説而悟無説由有相而悟無相則聖凡不足拘而如來亦可見矣無法可得分第二十二有法可得即非真空法性謂無可得者以本來各各具足故也須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提此段見佛於正覺之性一歸於空也前四論無得善現雖知無定法名菩提尚不脫一法字佛屢為遣除此因聞上無法可説故復問佛得菩提果無所得耶世尊見其意氣相投真為以空合空以水投水故印證之曰如是如是人心以覺為體因不覺而有覺只為倚著法相求覺所以不能直下承當豈知心體湛寂本如虗空無論萬法消融即使其中稍有幾微之法可留便非真覺性矣加一少字甚言其無也淨心行善分第二十三依般若行所作皆名善法了無高下體性平等安容四相復入哉世尊初答以無法可得為正覺達妄即真也二答以平等為正覺法無高下也三答以正助為正覺離四相而修善也故名淨心行善復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提上言無少法可得落斷滅見矣故復以實法實修告之曰此法之所以無可説者正以此菩提法千佛同源無奇異而甚平無分數而有等故於其中若智若愚共聞共見不分別諸佛是高衆生是下所以名為高而無上均而正等悟而正覺惟此覺性人人同具則先覺者正當覺其後覺而何有四相可存若觀佛作光明超絶相觀衆生作垢惑暗昧相則心不平等縱勤修一切不得菩提以用也佛法即用此不著相清淨之心修一切日用常行之法化其不平不等何善如之用心行善曰修復還性體曰得真性我本有之強名得耳須菩提所言善法者如來説即非善法是名善法前言佛法非佛法統言之而法不可執也此言善法非善法析言之而法亦不可執也法無所為善因性而善真性無我豈法有所助益而為善善與非善只在著意不著意間若執定善法便落法相恐人執有故隨説隨剗云所言善法者即非善法但虗名之耳然説到覺性中之善則善仍不在法上説矣福智無比分第二十四重言受持之功雖以七寶聚如須彌之高而用布施不惟百分不及一雖千萬億分亦不及持經般若之一分宜乎稱福智無比須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人説於前福德百分不及一百千萬億分乃至算數譬喻所不能及因言善法又推到布施因説布施又歸到受持解説是從善法連絡下來佛謂一四天下則有一須彌山若大千世界所有百億須彌山矣人能以須彌山王大之七寶集聚一處而不分人我之物以行布施較三千大千世界更多矣種因得果生生享之不盡然終無解脫之期故修福不如修慧若上根人自得領會者有幾中下根人必須將此教典為入道梯筏故前止言四句偈等此處特提般若波羅蜜經自行持誦以之教人其福德萬劫無量皆因其法之善故也算數譬喻總以明其善法耳自平等句至下即非凡夫是因無法可説生出善法一番問答自凡夫句以下則又以無相可説生出一合相一番問答也化無所化分第二十五受持般若即是度衆生久之般若智圓自然衆生見盡若欲離此別起心而謂度衆生則四相儼然是謂化無所化須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來即有我人衆生壽者上言經義之妙如此則此經之度人多矣而如來又言汝等聽法之學人勿謂今日説經時如來設一念以為我之説經單為我當度脫後世衆生也須菩提莫作如此之念何以故覺性平等誰有是性而為能度誰無是性而為所度但衆生自復本性佛實不曾度之前是佛自視此是他人視佛如此也若作念如此則佛本不著相人視其有四相矣二句反言以明果無衆生可度也須菩提如來説有我者即非有我而凡夫之人以為有我須菩提凡夫者如來説即非凡夫是名凡夫此發明無度衆生之我如來既無四相云何假名稱我蓋對所度衆生言然如來平日雖未嘗不自稱曰我心中却不著我相不自私已何有四相故度我即是度衆生本不差別而取相凡夫亦思度人乃自謂此經非我不能誦非我不能解誤執為有我則安可以凡夫之執遂謂有我度生有生我度哉此結前無我相也佛又恐分別聖凡阻其精進故又結前無人相而言凡夫者如來説當其既悟無我便是佛菩薩心腸即非凡夫則亦是從其在迷名之為凡夫而已并凡夫而無之而又何處有我乎此見聖凡一體正所謂是法平等此正如來借己以喻後人望後人不作凡夫度世想也法身非相分第二十六善現謂觀如來心不可離相佛言轉輪聖王亦具色相若果以色相見音聲求則遠皆法身非相之義也須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王即是如來須菩提白佛言世尊如我解佛所説義不應以三十二相觀如來此段又以色相反覆申明結前無壽者意也總是啓發善現悟到一合相處前言三十二相不可得見矣此復問可以相觀如來者正欲善現認清不應以色相見如來意如是如是是迎如來之機且順佛而説以相觀如來佛恐其執著應身不達法體故又以輪王即如來為難轉輪即法輪也輪王管四天下業福既多亦同佛具三十二相若執相觀如來則輪王亦當是佛豈知佛相由法身現王相依業因生雖似而實異何可執相論耶善現迷心頓釋遂云如我解佛所説轉輪王之義輪王雖修三十二行終不契清淨本來心則未可遂以如來目之如來仍不應以三十二相觀也前説見如來是令善現一眼覷定意此説觀如來是令善現一心會著意前説在外後説在內此二字之不同解也故善現已應如是而復悟不應也總之實得不在外見意爾時世尊而説偈言善現便能解佛難意佛遂説偈以證之若以色見我以音聲求我是人行邪道不能見如來法身之體不離於聲色然亦不在三十二相上認取我謂真我是佛性也佛不於三界現身意豈可以光明相好而見四十九年不説一字亦豈可以聽受文字而求若以色相見音聲求便失真空無相之旨誤入於邪道安得見如來真面目乎此深闢著相之非見人當收視返聽即性而修不在色相音聲幻妄處求如來也無斷無滅分第二十七般若性體離一切法與一切相苟不悟無斷無滅之理謂有則墮常見謂無則墮斷見皆失般若中道也須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者説諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不説斷滅相身相既不可執以觀如來又烏可緣以得菩提哉佛又恐離相觀如來謂人空則法亦空竟成斷滅見故説此以見菩提不滯諸相正所謂無實無虗也只重斷滅相三字如來既具此相而不以一相自存所以無處不具足耳是念者謂以生相觀如來也若作莫作反覆言之者申明色相音聲之不可泥也若作者指其失也莫作者開其悟也具足相即福德相佛先反其詞曰若作是取相之念則如來原不以具足相得菩提遂正其詞曰莫起是滯相之念如來原不以具足相而得菩提相是外相菩提是真性豈因外相而得是申明上文乃叮嚀諄切處佛又反其詞而曰汝若設念發菩提心者於一切法皆棄置之斷滅而不用如説佛身相幻形終屬有盡是為斷滅故説佛又正其詞而示之不可作是念也何故不可作是念蓋發求真性心者須依布施忍辱諸法修行不可遂斷滅佛法當知無為是有為之體有為是無為之用故不用法者為斷滅相理從心得奚干外相法以證心奚能斷滅大乘所修福德之因所得福德之果但離取著之相不同小乘斷滅見故曰於法不説斷滅相前闢著相為已渡者説此闢斷見為未渡者説也不受不貪分第二十八佛謂持般若故則知一切法無我能成就無生法忍其七寶布施之人豈可與此福德比量彼布施有貪受此持經無貪受以其不受是名正受如海納百川安有已哉須菩提若菩薩以滿恆河沙等世界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故説不受福德夫諸法雖不應斷滅然亦不可執著今不與持經者較而與得法者較乃形容佛法之妙受福德受字對上布施二字以其所施得其所受作字又對上受字因其所受見其所作此又借布施一段説出得成於忍不重布施也前以布施屬衆生此又屬之菩薩非謂菩薩去布施正從此印證菩提心耳假使菩薩以無量世界寶施較須彌山王聚更多矣祗為著相布施一念貪受福報便落人天小果不能成就自性功德若復有人知從前所説一切法只無我盡之其所由成在於能忍忍者堅忍不動之義即前無諍及一切善法與忍辱波羅蜜是也人惟不能忍便不能有成忍則六塵愛戀之情悉堅固無漏能制妄念不使之起便可件件放下到得人法兩空智與理冥才是得成於忍蓋佛以不忍度世以忍捐我有大忍於我斯能大不忍於世也既得無生法忍自與住相行施者不同此菩薩所得無為功德豈不遠勝寶施有為之功德乎然所得之故何以勝於前也蓋以得之者我所固有不假外來非因一施而一受以菩薩不受有漏法報故也善現又疑福所必得奚曰不受不知所謂不受者非云却而不受我所自有非人授之何處可容其受福德是性非有損益從何而受故又言菩薩所作福德不應貪著福德自作之自受之若據為我有求多於福德則貪矣此貪字須會上無為法有差別則知有為處即是貪矣貪則未有不著於相者菩薩所以不受也威儀寂靜分第二十九般若智體與十方虗空湛然常寂而不拒諸相寂而常照照而常寂行住坐臥四威儀中常住寂滅無不清淨故此分名為威儀寂靜須菩提若有人言如來若來若去若坐若臥是人不解我所説義何以故如來者無所從來亦無所去故名如來上言不應貪著則是法相尤不可著前論佛之身相此論身相中之運用也此段是借來去坐臥四字以喻如來之意四若字見非真有去來坐臥也人惟信如來是有形色的則心中忽設一來念便覺其若來而瞻禮敬肅之事起矣設一去念而以為若去則枯禪稿性之説起矣設一坐臥念而以為若坐臥則凡遇一塔一廟便謂此中有如來趺坐寢息而依藉之想又起矣故概以不解所説義解後人之惑無所從來二句不對下句只帶言之耳如來者如其所性而來便有與生俱來意非言來時一無所從也但此性虗靈若説從何處發腳便有影子故説一無所字下句玩一亦字則知佛但説如來不曾説如去來曰從來去曰所去蓋即以所從來者而還歸於所去也來者完全而來去者不欠缺而去即使去而復來依然如此何得不謂之如來乎由此細而微塵大而世界分與合無非此理下文遂暢言之一合理相分第三十佛謂微塵世界乃事相也能受微塵者乃理性也事相理性混合為一無所可分凡夫貪著事相而不悟理性所以徇生滅而罔究涅槃不容無斷説也須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不須菩提言甚多世尊何以故若是微塵衆實有者佛即不説是微塵衆所以者何佛説微塵衆即非微塵衆是名微塵衆此與下發明微塵世界之義説微塵説世界是言小之難容一芥大之可藏須彌而大小之形皆不可著故又反覆申明之世界原係塵聚而成非將世界碎作微塵今言其碎指妄念言見有所造作耳學道之人不達諸法皆空將廣大世界一念分別使卵胎濕化紛紜膠轕剖析為微塵汝意謂何寧為多否此以人所易曉者開發善現塵甚多可喻應身歷世務即悟答云碎世界為微塵以凡夫心量計之不勝其多矣又白世尊而自問彼微塵何故甚多自答云微塵之多無非影響虗妄之建立若微塵衆為實有佛即不説碎為微塵衆矣蓋謂真性為實有則不可説而微塵衆非實有故佛説之是可説皆虗妄所以謂不可説不可取又自問所以不説是微塵衆者何即自答云佛所説碎世界為微塵衆隨風則散隨水則凝本無定體可執之以為實乎執之無可執離之不必離但有微塵衆之名耳知此則知如來應身凡其去來坐臥不過虗應世而歸於空者世尊如來所説三千大千世界即非世界是名世界世界身之別名善現悟微塵并悟及世界區宇雖大然元會運世凡十二萬九千六百年天地亦終即非世界此世界之所以名耳然則如來法身無來無去亦不過虗住世而妙於空者何以故若世界實有者即是一合相如來説一合相即非一合相是名一合相又自問何故世界非真實自答云若世界為實有則聚微塵衆而成世界建世界於衆微塵即為一合之事相而無從解脫矣一合者一合而不可復分也未有合之事先起合之心心合於事而相形矣即如耳目口鼻未起一念色聲香味全然無形及念起而欲視則合於色相矣念起而欲聽則合於聲相矣念起而欲口鼻如其意則合於香味相矣此因一念所發遂與事相相牽如來常説一念相則不然如來既空塵相正性所存俱無執著其中自有不求合而合之理納世界於微塵世界即具於一微塵而不見有餘納微塵於世界一一微塵各現十方世界而不見不足非合非離是之謂一合相豈嘗有一合相可名乎凡言即非皆謂實無凡言是名皆謂虗名也前由微塵世界及佛相論其皆非真實而理無可説以見如來之非有説此由佛身及微塵世界論其皆無真實無同歸於空以見貪夫之不知空也須菩提一合相者即是不可説但凡夫之人貪著其事恐人妄生執著故并一合相而掃去之佛謂此理當俟悟者若以言語為説不惟中下凡夫説微塵著微塵説世界著世界即上根凡夫亦説一合著一合安能超悟哉事者對理而言真性即理即事縱橫無礙凡夫不明真性妄著性中所現五蘊六根之事貪戀而不肯割去泥一切色身為我沉淪六道無由脫離所以不能空世界而下等微塵也合而言一如膠膝著物始不相合才合便堅固而不可解所以合相易於貪著一者舉其初念而言初念一起即合到底著迷故謂之凡夫云爾如來無所説之意至此盡明知見不生分第三十一佛言發菩提心者諸法無相應如是知見信解自然於四相中不生知見也須菩提若人言佛説我見人見衆生見壽者見須菩提於意云何是人解我所説義不不也世尊是人不解如來所説義何以故世尊説我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見以下明離我法二見此節初離我見也經首降伏章若菩薩謂有生可度即著四相安住章若心取相即著四相四相乃一經所遣之執故佛問善現若人言佛處處説有四見者須菩提汝且思量此言佛所取義必與世人四見不同能解之否善現謂如來有真四見不同凡夫故言弗也世尊凡人迷妄之習在境為相在根為見外不住相原於內不住根世人見相不化無有真見見猶不見安能解佛所説義耶説義何如世尊説真四見即非如世人之有已無人分別愛憎壽夭之妄四見若是人明得真上起妄妄上起真真妄不分合而為一是名四見何謂真四見如來説一切衆生皆有佛性是真我見説一切衆生有無漏智性是真人見説一切衆生本無煩惱是真衆生見説一切衆生本性萬劫不壞是真壽者見前言我人等相而此言見有別言相則尚有相在言見則并無無相之見矣見非見之於目而直見之於心心有此見則相雖無而仍著於有如來此言恐後人誤信如來説法因有四見欲強制以歸於無故申言之須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩薩所言法相者如來説即非法相是名法相此離法見也究竟正覺中何有四相之名三如是指菩提心言照前應云何住及如是住句也不生法相應前云何降伏及如是降伏蓋法相不生則更無起滅也此已收到應無所住又起下如如不動句收到如是我聞句矣佛見善現所悟已徹即其問詞而結之曰凡聞經修法發無上覺心者於經中一切所言修行之法皆當清心解脫以如是心知覺如是心見識如是心解説不必生諸法相而有所取著也能布施不知施忍辱不知忍便不生法相矣蓋法相者入門之路而非造極之處所以借此引導不可以此證心佛又恐善現不知何為法相而令不生故釋之曰所謂法相者非有非無法到悟時且不用矣原不執著亦豈有相是法相亦虗名上達必由心悟耳蓋通收經中離即離非無住之理也前於初學則曰不取法相此於成學則曰不生法相前言立法者則曰即非佛法此言用法者則曰即非法相能不生相而無貪著庶超塵界證如來所以結全經住伏之理也應化非真分第三十二聞如來教而生信解斯則人因法悟法假人弘人法相傳流通無盡當機大衆天龍八部人等歡喜信聞流通於遐方矣須菩提若有人以滿無量阿僧祗世界七寶持用布施若有善男子善女人發菩提心者持於此經乃至四句偈等受持讀誦為人演説其福勝彼云何為人演説不取於相如如不動何以故此總結全經無住布施并前後二問也前此無相之故已了了分明此只借布施發出不取於相以證如如之旨菩薩見道之後福報一念未忘縱以無量無央數世界中之七寶與人較恆河沙更為大且多矣得福終歸消滅發心已差若善男女發心度生修菩薩行者只須於此經中四句偈等心手不釋悲憫衆生復為敷演其辭解説其義雖不計福而其福更勝彼寶施演字與解字不同解者只以其大意而解之演則并其字句而演之使天下後世無不推求詳衍而無一字一句稍存疑義也佛自問演説之法何如正以無有人我之相故耳故説法者不破所有只破所取取則差別熾然不取則有無平等故凡一切相皆無足取而但如其心以應之上如字虗下如字實謂適如其所如也雖當紛擾之處而此中却如如不動二句是演説之方無為法要旨也如如者如其所來如其所往諸法如義即佛智慧也不動者不為得心所動不為因果所動蓋佛設化不過應緣而説緣了則寂乃自如之甚而心體未嘗動也不取於相則無住如如不動則降伏矣與人演説即是相云何不取於相耶一切有為法如夢幻泡影如露亦如電應作如是觀不動是無為法取相是有為法佛以無形相而無所為為真性故以有形相而一切有為為偽妄總屬因緣無有自性縱得福報倐忽變滅就如夢之得醒而夢境成虗術之有幻而形聲莫據水之有泡而泡滅即無有泡影之隨身影息而即無有影與朝露之晞於日電火之熄其光六者皆瞬息無形何有為之法可執乎人能識真空無相之旨則在在皆如是矣觀即般若妙智能如是觀則知如來不動之體可以為人演説而住心降心究竟無餘矣一經始末皆稱如是始云如是住如是降心至此又云如是觀故知妙智實一經之宗也佛説是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所説皆大歡喜信受奉行釋迦在祇園説法已畢爾時弟子中之長老則有須菩提前説善男女是何等人僧衆之比丘男即千二百五十人之輩又後來者比丘尼乃出家尼姑也在家之優婆塞此言持戒男是居士即經中善男子也在家優婆夷是道姑此云近事女言其親近比丘尼而承事即經中善女人也天神謂欲界色界無色界諸禪天也人類謂王臣兆庶鬼王之名阿修羅有鬼道天道人道六道中之三道也聞如來説此微妙經義皆得解脫無不歡喜之至信之切而領受其言身體力踐而奉行之夫聞法醒夢喜心易生而身體力行談何容易不篤信者不領受信受而不奉行雖喜猶弗喜也必智慧真肖金剛才斬六根斷絶佛法之能感人如此豈非護念付屬之善歟如來從鹿苑至跋提中間四十九年未嘗説一字茲與須菩提問答成經無非為化導羣生而設然此理説亦無説也
